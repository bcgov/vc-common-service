# Environment overrides: PROD
# BC Gov OpenShift (Silver/Gold) — production namespace.
# TODO: replace <LICENSE_PLATE> and hostnames with real values from the platform team.

image:
  tag: "1.0.0"        # pin an immutable released tag in production
  pullPolicy: IfNotPresent

replicaCount: 3

route:
  enabled: true
  # TODO: confirm production hostname.
  host: vc-common-service.apps.silver.devops.gov.bc.ca
  tls:
    enabled: true
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 8
  targetCPUUtilizationPercentage: 75

# Run migrations as an init container in prod (fail-fast before serving traffic).
migrations:
  enabled: false     # TODO: enable once the migration runner command is available

worker:
  enabled: false     # TODO: enable once dist/worker.js ships
  replicaCount: 2
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 75

config:
  NODE_ENV: production
  LOG_LEVEL: info
  # TODO: point at the production PostgreSQL service.
  DB_HOST: <PROD_DB_HOST>
  DB_NAME: vc_common_service
  DB_SYNCHRONIZE: "false"
  DB_LOGGING: "false"

secret:
  # TODO: name of the pre-provisioned Secret in the production namespace.
  existingSecret: vc-common-service-secret
  create: false

networkPolicy:
  enabled: true
  keycloak:
    enabled: true
