# CI test values: render/lint the chart with all major components enabled and
# without depending on cluster-provisioned secrets. Used by `helm template`
# and `helm lint` in CI pipelines.
image:
  registry: ghcr.io
  repository: bcgov/vc-common-service
  tag: ci

route:
  enabled: true
  host: vc-common-service.example.com

worker:
  enabled: true
  autoscaling:
    enabled: true

autoscaling:
  enabled: true

migrations:
  enabled: true

secret:
  create: true
  data:
    DB_USERNAME: ci-user
    DB_PASSWORD: ci-pass

networkPolicy:
  enabled: true
  keycloak:
    enabled: true

config:
  DB_HOST: postgres
