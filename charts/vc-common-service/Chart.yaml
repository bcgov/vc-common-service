apiVersion: v2
name: vc-common-service
description: A Helm chart to deploy the VC Common Service (NestJS) on BC Gov OpenShift
# Application chart (deployable) rather than a library chart.
type: application

# Chart version — bump on every change to the chart or its templates (SemVer).
version: 0.1.0

# Version of the vc-common-service application being deployed. Overridden by
# image.tag when set; otherwise this value is used as the image tag.
appVersion: "0.0.1"

home: https://github.com/bcgov/vc-common-service
sources:
  - https://github.com/bcgov/vc-common-service
maintainers:
  - name: bcgov
    url: https://github.com/bcgov
keywords:
  - verifiable-credentials
  - nestjs
  - openshift
  - bcgov
