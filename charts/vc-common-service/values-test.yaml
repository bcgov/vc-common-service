# Environment overrides: TEST
# BC Gov OpenShift (Silver) — test namespace.
# TODO: replace <LICENSE_PLATE> and hostnames with real values from the platform team.

image:
  tag: "test"         # promoted, immutable tag from CI
  pullPolicy: IfNotPresent

replicaCount: 2

route:
  enabled: true
  # TODO: confirm hostname (typically *.apps.silver.devops.gov.bc.ca)
  host: vc-common-service-test.apps.silver.devops.gov.bc.ca
  tls:
    enabled: true
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

resources:
  requests:
    cpu: 50m
    memory: 192Mi
  limits:
    cpu: 500m
    memory: 384Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 80

migrations:
  enabled: false

worker:
  enabled: false
  replicaCount: 1
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80

config:
  NODE_ENV: production
  LOG_LEVEL: info
  # TODO: point at the test PostgreSQL service.
  DB_HOST: <TEST_DB_HOST>
  DB_NAME: vc_common_service

secret:
  # TODO: name of the pre-provisioned Secret in the test namespace.
  existingSecret: vc-common-service-secret
  create: false

networkPolicy:
  enabled: true
  keycloak:
    enabled: true
