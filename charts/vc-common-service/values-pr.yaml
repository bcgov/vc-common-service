# PR Environment overlay — only deltas from the chart defaults.
# Used by .github/workflows/pr-deploy.yml for ephemeral PR review environments.
# Per-PR values (image.tag, config.DB_NAME, route.host) and config.DB_HOST
# (from the PR_DB_HOST repository variable) are injected via --set.

resources:
  requests:
    cpu: 25m

config:
  NODE_ENV: development
  LOG_LEVEL: debug
  DB_HOST: vc-common-service-pr-db
  DB_LOGGING: "true"

secret:
  # PR databases are owned by the same application user as dev; reuse the dev Secret.
  # (With existingSecret set the chart creates no Secret of its own; leftover
  # per-PR objects are removed by pr-cleanup.yml's label-based delete.)
  existingSecret: vc-common-service-pr-secret
