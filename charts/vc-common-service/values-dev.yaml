# Environment overrides: DEV
# BC Gov OpenShift (Silver) — dev namespace.
# TODO: replace <LICENSE_PLATE> and hostnames with real values from the platform team.

image:
  tag: "dev"          # or a git SHA promoted by CI
  pullPolicy: Always

replicaCount: 1

route:
  enabled: true
  # TODO: confirm hostname (typically *.apps.silver.devops.gov.bc.ca)
  host: vc-common-service-dev.apps.silver.devops.gov.bc.ca
  tls:
    enabled: true
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

resources:
  requests:
    cpu: 25m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: false

# Migrations run automatically in dev once the runner command lands.
migrations:
  enabled: false

worker:
  enabled: false
  replicaCount: 1
  autoscaling:
    enabled: false

config:
  NODE_ENV: development
  LOG_LEVEL: debug
  # Bare hostname only — DB_PORT defaults to 5432 separately, do not append ":5432" here.
  DB_HOST: vc-common-service-db
  DB_NAME: vc_common_service
  DB_LOGGING: "true"

secret:
  # DB_USERNAME / DB_PASSWORD (and any signing/HMAC secrets the app reads).
  existingSecret: vc-common-service-secret
  create: false

networkPolicy:
  enabled: true
  keycloak:
    enabled: false
