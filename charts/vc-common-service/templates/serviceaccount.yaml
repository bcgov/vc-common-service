{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "vc-common-service.serviceAccountName" . }}
  namespace: {{ include "vc-common-service.namespace" . }}
  labels:
    {{- include "vc-common-service.labels" . | nindent 4 }}
  {{- with (merge (dict) .Values.serviceAccount.annotations .Values.commonAnnotations) }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
{{- end }}
