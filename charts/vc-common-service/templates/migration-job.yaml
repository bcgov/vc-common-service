{{- if .Values.migrations.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "vc-common-service.fullname" . }}-migrate
  labels:
    helm.sh/chart: {{ include "vc-common-service.chart" . }}
    app.kubernetes.io/name: {{ include "vc-common-service.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: migration
    {{- if .Chart.AppVersion }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    {{- end }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: {{ include "vc-common-service.name" . }}
  annotations:
    # Run migrations once per release, before the app pods roll. Running as a
    # hook (instead of a per-pod init container) guarantees a single execution
    # and avoids concurrent migration runs across replicas / HPA scale-ups.
    "helm.sh/hook": {{ .Values.migrations.hook.types | quote }}
    "helm.sh/hook-weight": {{ .Values.migrations.hook.weight | quote }}
    "helm.sh/hook-delete-policy": {{ .Values.migrations.hook.deletePolicy | quote }}
    {{- if .Values.migrations.argocd.enabled }}
    # ArgoCD does not execute Helm hooks; PreSync gives the equivalent ordering
    # (migrations complete before the main sync rolls the Deployment) under GitOps.
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    {{- end }}
spec:
  backoffLimit: {{ .Values.migrations.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.migrations.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "vc-common-service.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: migration
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      restartPolicy: Never
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "vc-common-service.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.migrations.waitForDB.enabled }}
      initContainers:
        - name: wait-for-db
          image: "{{ .Values.migrations.waitForDB.image }}:{{ .Values.migrations.waitForDB.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command:
            - /bin/sh
            - -c
          args:
            - >-
              until nc -z "$DB_HOST" "$DB_PORT"; do
              echo "waiting for database $DB_HOST:$DB_PORT"; sleep 2; done
          envFrom:
            {{- include "vc-common-service.envFrom" . | nindent 12 }}
      {{- end }}
      containers:
        - name: migrate
          image: {{ include "vc-common-service.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command:
            {{- toYaml .Values.migrations.command | nindent 12 }}
          {{- with .Values.migrations.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          envFrom:
            {{- include "vc-common-service.envFrom" . | nindent 12 }}
          {{- with .Values.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.migrations.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
