{{- if and .Values.secret.create (not .Values.secret.existingSecret) -}}
{{- $secretName := include "vc-common-service.secretName" . -}}
{{- /* Preserve previously generated values across upgrades. */ -}}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace $secretName) -}}
{{- $existingData := dict -}}
{{- if $existing -}}
{{- $existingData = $existing.data -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ include "vc-common-service.namespace" . }}
  labels:
    {{- include "vc-common-service.labels" . | nindent 4 }}
  {{- $secretAnnotations := merge (dict) .Values.commonAnnotations }}
  {{- if .Values.secret.retainOnUninstall }}
  {{- $_ := set $secretAnnotations "helm.sh/resource-policy" "keep" }}
  {{- end }}
  {{- with $secretAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
data:
  {{- /* Explicit key/values from values.yaml (base64-encoded here). */}}
  {{- range $key, $value := .Values.secret.data }}
  {{- if $value }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- else if hasKey $existingData $key }}
  {{ $key }}: {{ index $existingData $key | quote }}
  {{- end }}
  {{- end }}
  {{- /* Auto-generated keys: reuse existing value if present, else generate. */}}
  {{- range $key, $length := .Values.secret.generated }}
  {{- if hasKey $existingData $key }}
  {{ $key }}: {{ index $existingData $key | quote }}
  {{- else }}
  {{ $key }}: {{ randAlphaNum (int $length) | b64enc | quote }}
  {{- end }}
  {{- end }}
{{- end }}
