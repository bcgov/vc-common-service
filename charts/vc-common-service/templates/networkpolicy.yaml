{{- if .Values.networkPolicy.enabled -}}
{{- $commonSelector := dict "app.kubernetes.io/name" (include "vc-common-service.name" .) "app.kubernetes.io/instance" .Release.Name -}}
{{- if .Values.networkPolicy.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "vc-common-service.fullname" . }}-allow-router
  namespace: {{ include "vc-common-service.namespace" . }}
  labels:
    {{- include "vc-common-service.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  podSelector:
    matchLabels:
      {{- include "vc-common-service.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.ingress.routerNamespaceSelector | nindent 14 }}
      ports:
        - protocol: TCP
          port: http
    {{- with .Values.networkPolicy.ingress.extraIngress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
{{- if .Values.networkPolicy.database.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "vc-common-service.fullname" . }}-egress-db
  namespace: {{ include "vc-common-service.namespace" . }}
  labels:
    helm.sh/chart: {{ include "vc-common-service.chart" . }}
    app.kubernetes.io/name: {{ include "vc-common-service.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: database
    {{- if .Chart.AppVersion }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    {{- end }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: {{ include "vc-common-service.name" . }}
    {{- with .Values.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  # Applies to both API and Worker pods (matched by name + instance).
  podSelector:
    matchLabels:
      {{- toYaml $commonSelector | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    - to:
        {{- if .Values.networkPolicy.database.namespaceSelector }}
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.database.namespaceSelector | nindent 14 }}
          {{- with .Values.networkPolicy.database.podSelector }}
          podSelector:
            matchLabels:
              {{- toYaml . | nindent 14 }}
          {{- end }}
        {{- else if .Values.networkPolicy.database.podSelector }}
        - podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.database.podSelector | nindent 14 }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.database.port }}
    {{- with .Values.networkPolicy.database.extraEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
{{- if .Values.networkPolicy.keycloak.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "vc-common-service.fullname" . }}-egress-keycloak
  namespace: {{ include "vc-common-service.namespace" . }}
  labels:
    {{- include "vc-common-service.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  # Only the API reaches Keycloak (upstream IdP).
  podSelector:
    matchLabels:
      {{- include "vc-common-service.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    - to:
        {{- if .Values.networkPolicy.keycloak.namespaceSelector }}
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.keycloak.namespaceSelector | nindent 14 }}
          {{- with .Values.networkPolicy.keycloak.podSelector }}
          podSelector:
            matchLabels:
              {{- toYaml . | nindent 14 }}
          {{- end }}
        {{- else if .Values.networkPolicy.keycloak.podSelector }}
        - podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.keycloak.podSelector | nindent 14 }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.keycloak.port }}
    {{- with .Values.networkPolicy.keycloak.extraEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
{{- if and .Values.networkPolicy.dnsEgress.enabled (or .Values.networkPolicy.database.enabled .Values.networkPolicy.keycloak.enabled) }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "vc-common-service.fullname" . }}-egress-dns
  namespace: {{ include "vc-common-service.namespace" . }}
  labels:
    {{- include "vc-common-service.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  # Allow DNS resolution for all app pods. Required because declaring any egress
  # rule otherwise implicitly denies all other egress -- including cluster DNS,
  # which would break hostname resolution of the database and Keycloak.
  podSelector:
    matchLabels:
      {{- toYaml $commonSelector | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    - to: []
      ports:
        - protocol: UDP
          port: {{ .Values.networkPolicy.dnsEgress.port }}
        - protocol: TCP
          port: {{ .Values.networkPolicy.dnsEgress.port }}
{{- end }}
{{- end }}
