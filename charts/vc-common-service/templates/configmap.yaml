apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vc-common-service.configMapName" . }}
  namespace: {{ include "vc-common-service.namespace" . }}
  labels:
    {{- include "vc-common-service.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  {{- range $key, $value := .Values.config }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
