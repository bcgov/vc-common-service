openapi: 3.1.0
info:
  title: VC Common Service API
  version: 1.0.0
  description: |
    Multi-tenant API providing a format-agnostic abstraction layer for Verifiable Credential (VC) operations.
    Normalizes issue/verify/hold patterns across credential formats (AnonCreds, SD-JWT, mDL, W3C VC) and
    back-end agents (Traction/ACA-Py, Credo Agent Service), exposing a single homogeneous REST API.

    This API is organized into three distinct surfaces, each targeting a different audience:

    | Surface | Audience | Auth |
    |---|---|---|
    | **Platform Administration** | Service operators | `platform-admin` role |
    | **Tenant Management** | Tenant administrators | `tenants:admin` scope |
    | **VC Operations** | Application developers / API consumers | Domain scopes (`credentials:offer`, `credentials:verify`, etc.) |

    ## Authentication
    All endpoints (except health checks and public discovery) require a Bearer JWT issued by the app's
    OIDC provider at `/oidc/token`. Tokens are obtained via:
    - **User login**: Authorization Code + PKCE flow (federated to Keycloak)
    - **Service-to-service**: `client_credentials` grant

    ## Async Operations
    Credential operations that require external party action return `202 Accepted` with an Operation
    resource. Poll `GET /operations/:id` or register webhooks for completion notifications.

    ## Pagination
    All list endpoints use cursor-based pagination with `?cursor=<opaque>&limit=<1-100>`.

    ## Rate Limiting
    Per-tenant rate limits apply. Exceeding limits returns `429` with `Retry-After` header.

    ## Idempotency
    POST endpoints accept an `Idempotency-Key` header (UUIDv4) to prevent duplicate resource creation.

    ## Error Responses
    All authenticated endpoints may return:
    - `401 Unauthorized` — token is missing, expired, or invalid
    - `403 Forbidden` — token is valid but lacks the required scope or role

    These are not repeated on each operation for brevity.
    See `components/responses/Unauthorized` and `components/responses/Forbidden` for the schema.
  contact:
    name: BC Gov Digital Trust
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: https://api.vc-common.example.com
    description: Production
  - url: http://localhost:3000
    description: Local development

# ── Tag Groups (Redoc x-tagGroups) ─────────────────────────────────────
# Organizes the sidebar into four audience-scoped surfaces.
# Swagger UI ignores x-tagGroups; use Redoc for grouped rendering.
x-tagGroups:
  - name: "🔑 Authentication"
    description: |
      Token exchange and tenant context switching — obtain a tenant-scoped Bearer
      token here before calling any tenant-scoped endpoint.
    tags:
      - Auth

  - name: "🔧 Platform Administration"
    description: |
      Endpoints for **service operators** who manage the platform itself.
      Requires the `platform-admin` role. Tenants are not permitted to call these endpoints.
    tags:
      - Health
      - Tenants
      - Admin

  - name: "🏢 Tenant Management"
    description: |
      Endpoints for **tenant administrators** who configure their tenant's VC infrastructure.
      Requires `tenants:admin` scope (or explicit domain scopes where noted).
      These are setup/configuration operations — not runtime credential flows.
    tags:
      - Tenant Settings
      - Tenant Users
      - Connectors
      - Credential Definitions
      - Issuance Profiles
      - Verification Profiles
      - Clients
      - Webhooks
      - Audit Logs
      - Events

  - name: "🔐 VC Operations"
    description: |
      Endpoints for **application developers and API consumers** performing runtime VC operations.
      Requires domain scopes: `credentials:offer`, `credentials:verify`, `credentials:hold`,
      `credentials:revoke`, `connections:manage`. Discovery endpoints are unauthenticated.
    tags:
      - Credentials
      - Presentations
      - Connections
      - Operations
      - Discovery
      - Webhook Ingestion

tags:
  # ── Authentication ──────────────────────────────────────────────────────
  - name: Auth
    description: |
      Token exchange and tenant context switching.
      **Audience**: All callers — obtain or switch a tenant-scoped Bearer token before
      making any tenant-scoped API calls.
      **Auth**: Active Bearer JWT required for `switch-tenant`.

  # ── Platform Administration ────────────────────────────────────────────
  - name: Health
    description: |
      Liveness and readiness probes.
      **Audience**: Infrastructure / load balancers.
      **Auth**: None required.
  - name: Tenants
    description: |
      Tenant lifecycle management: create, list, read, update, suspend, and delete tenants.
      Tenant-level configuration and onboarding are in the Tenant Settings group.
      **Audience**: Platform administrators (`platform-admin` role).
      **Auth**: `platform-admin` role required for all mutating operations.
  - name: Admin
    description: |
      Platform-wide operational tooling: dead-letter queue management, session revocation,
      global scope/role definitions, usage limit overrides, and bulk event replay.
      **Audience**: Platform administrators (`platform-admin` role) only.
      **Auth**: `platform-admin` role required for all endpoints in this group.

  # ── Tenant Management ──────────────────────────────────────────────────
  - name: Tenant Settings
    description: |
      Tenant-level self-management: onboarding workflow, tenant configuration,
      usage monitoring, and role→scope customization within the tenant.
      **Audience**: Tenant administrators.
      **Auth**: `tenants:admin` scope.
  - name: Tenant Users
    description: |
      Invite, list, update roles for, and remove users within a tenant.
      **Audience**: Tenant administrators.
      **Auth**: `tenants:admin` scope or `users:manage` scope.
  - name: Connectors
    description: |
      Register and manage backend agent connector credentials (Traction, Credo).
      Connectors are a prerequisite for all VC operations.
      **Audience**: Tenant administrators.
      **Auth**: `tenants:admin` scope.
  - name: Credential Definitions
    description: |
      Register credential schemas and definitions with the backend agent.
      Credential definitions are the low-level foundation that Issuance Profiles wrap.
      **Audience**: Tenant administrators (setup step — API consumers use profiles, not definitions directly).
      **Auth**: `tenants:admin` scope.
  - name: Issuance Profiles
    description: |
      Create, publish, and deprecate named/versioned issuance configurations.
      Profiles abstract credential format, schema, and protocol behind a stable identifier
      consumed by VC Operations (`credentials:offer`).
      **Audience**: Tenant administrators.
      **Auth**: `profiles:manage` scope (implied by `tenants:admin`).
  - name: Verification Profiles
    description: |
      Create, publish, and deprecate named/versioned verification templates.
      Templates define the presentation definition consumed by VC Operations (`credentials:verify`).
      **Audience**: Tenant administrators.
      **Auth**: `profiles:manage` scope (implied by `tenants:admin`).
  - name: Clients
    description: |
      Register and manage OAuth2 API clients for service-to-service (`client_credentials`) access.
      Secrets are returned once at creation and are never retrievable again.
      **Audience**: Tenant administrators.
      **Auth**: `clients:manage` scope (implied by `tenants:admin`).
  - name: Webhooks
    description: |
      Register, list, and delete webhook endpoints that receive async VC event notifications.
      Events: `credential.issued`, `credential.verified`, `credential.accepted`,
      `credential.rejected`, `credential.revoked`, `connection.established`.
      **Audience**: Tenant administrators.
      **Auth**: `tenants:admin` scope.
  - name: Audit Logs
    description: |
      Append-only audit trail for all credential operations and admin actions within a tenant.
      Supports filtered queries and CSV export for compliance reporting.
      **Audience**: Tenant administrators.
      **Auth**: `audit:read` scope. (Distinct from `logs:read`, which gates tenant-scoped
      observability/log access via the Grafana gateway — audit-log API access should not imply
      Grafana log access, or vice-versa.)

  - name: Events
    description: |
      Tenant-scoped view of the async job queue: list and replay failed (dead-letter) jobs
      that belong to this tenant.
      Provides self-service recovery for failed credential state updates, webhook deliveries,
      and other async operations without requiring platform-admin intervention.
      Server filters all results to `tenant_id` from the JWT — callers cannot access other tenants' jobs.
      **Audience**: Tenant administrators.
      **Auth**: `tenants:admin` scope.

  # ── VC Operations ──────────────────────────────────────────────────────
  - name: Credentials
    description: |
      Issue, batch-issue, accept, reject, revoke, and query credentials.
      Supports both DIDComm (connection-based) and OID4VCI (connectionless) delivery modes.
      Mutating operations return `202 Accepted` with an `Operation` resource; use the
      Operations group to poll for completion or register webhooks.
      **Audience**: Application developers / API consumers.
      **Auth**: `credentials:offer` (issuance), `credentials:revoke` (revocation),
      `credentials:hold` (holder accept/reject).
  - name: Presentations
    description: |
      Request and verify credential presentations (proof requests).
      Supports AnonCreds proof requests and DIF Presentation Exchange (OID4VP).
      Async — returns an `Operation` resource; poll or use webhooks for result.
      **Audience**: Application developers / API consumers.
      **Auth**: `credentials:verify` scope.
  - name: Connections
    description: |
      Create and manage DIDComm / OID4VC peer connections.
      A connection is required for DIDComm-based issuance and verification;
      OID4VCI/VP flows are connectionless.
      **Audience**: Application developers / API consumers.
      **Auth**: `connections:manage` scope.
  - name: Operations
    description: |
      Track and poll async operations created by Credentials, Presentations, and Connections.
      All mutating VC operations return a reference to an Operation resource here.
      **Audience**: Application developers / API consumers.
      **Auth**: Any valid tenant-scoped Bearer JWT.
  - name: Discovery
    description: |
      Public, unauthenticated OID4VCI-aligned discovery endpoints.
      Wallets and external verifiers use these to find published issuance/verification profiles
      without requiring a Bearer token.
      **Audience**: External wallets, verifiers, and public clients.
      **Auth**: None required.
  - name: Webhook Ingestion
    description: |
      Inbound webhook receivers for async state updates from backend agents
      (Traction/ACA-Py, Credo Agent Service).
      Authenticated via HMAC shared secret — not a Bearer JWT.
      **Audience**: Internal — called by backend agents only, not by API consumers.
      **Auth**: `X-Traction-Signature` HMAC header.

security:
  - BearerAuth: []

paths:
  # ─── Health ───────────────────────────────────────────────────────────
  /health/live:
    get:
      operationId: getLiveness
      summary: Liveness probe
      description: Returns 200 if the process is running.
      tags: [Health]
      security: []
      responses:
        "200":
          description: Process is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /health/ready:
    get:
      operationId: getReadiness
      summary: Readiness probe
      description: Returns 200 if all critical dependencies (DB, pg-boss, OIDC provider) are healthy.
      tags: [Health]
      security: []
      responses:
        "200":
          description: All dependencies healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: One or more critical dependencies unhealthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  # ─── Auth ─────────────────────────────────────────────────────────────
  /api/v1/auth/switch-tenant:
    post:
      operationId: switchTenant
      summary: Switch active tenant context
      description: |
        Exchange the current valid token for a new token scoped to a different tenant.
        The user must have membership in the target tenant.
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id]
              properties:
                tenant_id:
                  type: string
                  format: uuid
                  description: Target tenant to switch to
      responses:
        "200":
          description: New token issued for the target tenant
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  token_type:
                    type: string
                    example: Bearer
                  expires_in:
                    type: integer
                    example: 300
        "403":
          $ref: "#/components/responses/Forbidden"

  # ─── Tenants ──────────────────────────────────────────────────────────
  /api/v1/tenants:
    post:
      operationId: createTenant
      summary: Create a new tenant
      tags: [Tenants]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenantRequest"
      responses:
        "201":
          description: Tenant created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
    get:
      operationId: listTenants
      summary: List tenants
      description: Platform admins see all tenants; regular users see only their memberships.
      tags: [Tenants]
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated tenant list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Tenant"

  /api/v1/tenants/{tenantId}:
    parameters:
      - $ref: "#/components/parameters/TenantId"
    get:
      operationId: getTenant
      summary: Get tenant details
      tags: [Tenants]
      responses:
        "200":
          description: Tenant details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateTenant
      summary: Update tenant
      tags: [Tenants]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTenantRequest"
      responses:
        "200":
          description: Tenant updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteTenant
      summary: Soft-delete tenant (platform-admin only)
      tags: [Tenants]
      responses:
        "204":
          description: Tenant deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/tenants/{tenantId}/status:
    parameters:
      - $ref: "#/components/parameters/TenantId"
    patch:
      operationId: updateTenantStatus
      summary: Suspend or reactivate a tenant (platform-admin only)
      tags: [Tenants]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  $ref: "#/components/schemas/TenantStatus"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"

  /api/v1/tenants/{tenantId}/config:
    parameters:
      - $ref: "#/components/parameters/TenantId"
    patch:
      operationId: updateTenantConfig
      summary: Update tenant configuration
      tags: [Tenant Settings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantConfig"
      responses:
        "200":
          description: Configuration updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"

  /api/v1/tenants/{tenantId}/onboarding:
    parameters:
      - $ref: "#/components/parameters/TenantId"
    get:
      operationId: getOnboardingStatus
      summary: Get tenant onboarding progress
      tags: [Tenant Settings]
      responses:
        "200":
          description: Onboarding status
          content:
            application/json:
              schema:
                type: object
                properties:
                  steps:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        completed:
                          type: boolean
                        skipped:
                          type: boolean
                  progress_percent:
                    type: integer
                    minimum: 0
                    maximum: 100

  /api/v1/tenants/{tenantId}/onboarding/steps/{stepName}/complete:
    parameters:
      - $ref: "#/components/parameters/TenantId"
      - name: stepName
        in: path
        required: true
        schema:
          type: string
          enum: [configure-connector, register-credential-definition, create-issuance-profile, register-api-client]
    post:
      operationId: completeOnboardingStep
      summary: Mark an onboarding step as complete
      tags: [Tenant Settings]
      responses:
        "200":
          description: Step marked complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  steps:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        completed:
                          type: boolean
                        skipped:
                          type: boolean
                  progress_percent:
                    type: integer
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/tenants/{tenantId}/onboarding/steps/{stepName}/skip:
    parameters:
      - $ref: "#/components/parameters/TenantId"
      - name: stepName
        in: path
        required: true
        schema:
          type: string
          enum: [configure-connector, register-credential-definition, create-issuance-profile, register-api-client]
    post:
      operationId: skipOnboardingStep
      summary: Skip an onboarding step (mark as skipped)
      tags: [Tenant Settings]
      responses:
        "200":
          description: Step marked skipped
          content:
            application/json:
              schema:
                type: object
                properties:
                  steps:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        completed:
                          type: boolean
                        skipped:
                          type: boolean
                  progress_percent:
                    type: integer
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/tenants/{tenantId}/onboarding/reset:
    parameters:
      - $ref: "#/components/parameters/TenantId"
    post:
      operationId: resetOnboarding
      summary: Reset onboarding progress (testing/demo only)
      description: Clears all onboarding step progress and allows restart. Intended for development and testing scenarios.
      tags: [Tenant Settings]
      responses:
        "200":
          description: Onboarding progress reset
          content:
            application/json:
              schema:
                type: object
                properties:
                  steps:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        completed:
                          type: boolean
                        skipped:
                          type: boolean
                  progress_percent:
                    type: integer
                    example: 0

  # ─── Tenant Users ─────────────────────────────────────────────────────
  /api/v1/tenants/{tenantId}/users:
    parameters:
      - $ref: "#/components/parameters/TenantId"
    post:
      operationId: inviteUser
      summary: Invite a user to the tenant
      tags: [Tenant Users]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteUserRequest"
      responses:
        "201":
          description: User invited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantUser"
        "409":
          $ref: "#/components/responses/Conflict"
    get:
      operationId: listTenantUsers
      summary: List tenant members
      tags: [Tenant Users]
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated user list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/TenantUser"

  /api/v1/tenants/{tenantId}/users/{userId}:
    parameters:
      - $ref: "#/components/parameters/TenantId"
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      operationId: updateTenantUser
      summary: Update user role
      tags: [Tenant Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  $ref: "#/components/schemas/TenantRole"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantUser"
    delete:
      operationId: removeTenantUser
      summary: Remove user from tenant
      tags: [Tenant Users]
      responses:
        "204":
          description: User removed
        "409":
          description: Cannot remove last owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── Connectors ──────────────────────────────────────────────────────
  /api/v1/tenants/{tenantId}/connectors:
    parameters:
      - $ref: "#/components/parameters/TenantId"
    post:
      operationId: createConnector
      summary: Register a backend agent connector
      tags: [Connectors]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConnectorRequest"
      responses:
        "201":
          description: Connector registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connector"
        "422":
          $ref: "#/components/responses/ValidationError"
    get:
      operationId: listConnectors
      summary: List tenant connectors
      tags: [Connectors]
      responses:
        "200":
          description: Connector list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Connector"

  /api/v1/tenants/{tenantId}/connectors/{connectorId}:
    parameters:
      - $ref: "#/components/parameters/TenantId"
      - name: connectorId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: getConnector
      summary: Get connector details
      tags: [Connectors]
      responses:
        "200":
          description: Connector details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connector"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateConnector
      summary: Update connector endpoint or rotate credentials
      tags: [Connectors]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateConnectorRequest"
      responses:
        "200":
          description: Connector updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connector"
    delete:
      operationId: deleteConnector
      summary: Remove connector
      description: Fails if active credential definitions depend on this connector.
      tags: [Connectors]
      responses:
        "204":
          description: Connector removed
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/tenants/{tenantId}/connectors/{connectorId}/test:
    parameters:
      - $ref: "#/components/parameters/TenantId"
      - name: connectorId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      operationId: testConnector
      summary: Test connector connectivity
      tags: [Connectors]
      responses:
        "200":
          description: Connectivity test result
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [healthy, unhealthy]
                  latency_ms:
                    type: integer
                  message:
                    type: string

  # ─── Credential Definitions ──────────────────────────────────────────
  /api/v1/tenants/{tenantId}/credential-definitions:
    parameters:
      - $ref: "#/components/parameters/TenantId"
    post:
      operationId: createCredentialDefinition
      summary: Register a credential definition
      tags: [Credential Definitions]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCredentialDefinitionRequest"
      responses:
        "201":
          description: Credential definition registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CredentialDefinition"
        "422":
          $ref: "#/components/responses/ValidationError"
    get:
      operationId: listCredentialDefinitions
      summary: List credential definitions
      tags: [Credential Definitions]
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
        - name: format
          in: query
          schema:
            $ref: "#/components/schemas/CredentialFormat"
        - name: connector_type
          in: query
          schema:
            $ref: "#/components/schemas/ConnectorType"
      responses:
        "200":
          description: Paginated credential definition list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/CredentialDefinition"

  /api/v1/tenants/{tenantId}/credential-definitions/{credDefId}:
    parameters:
      - $ref: "#/components/parameters/TenantId"
      - name: credDefId
        in: path
        required: true
        schema:
