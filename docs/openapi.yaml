          This is **not** the persisted Credential record UUID.
    post:
      operationId: rejectCredential
      summary: Reject a credential offer (holder)
      tags: [Credentials]
      responses:
        "200":
          description: Credential rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Operation"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/tenants/{tenantId}/credentials/{credentialId}/revoke:
    parameters:
      - $ref: "#/components/parameters/TenantId"
