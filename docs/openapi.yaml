  # ─── Credentials ─────────────────────────────────────────────────────
  /api/v1/tenants/{tenantId}/credentials/offer:
    parameters:
      - $ref: "#/components/parameters/TenantId"
    post:
      operationId: offerCredential
      summary: Offer/issue a credential
      description: |
        Issue a credential via a published issuance profile.

        **Delivery mode** is determined by the presence of `connection_id`:
        - **Present** → DIDComm delivery (push offer to connected agent). Returns 202.
        - **Absent** → OID4VCI delivery (generate credential_offer_uri). Returns 200.

        MVP: Only DIDComm delivery is supported (Traction adapter). Omitting `connection_id` returns 400.
      tags: [Credentials]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OfferCredentialRequest"
            examples:
              profile_didcomm:
                summary: Issue via profile (DIDComm)
                value:
                  profile_id: "drivers-license/1.0"
                  connection_id: "c3d4e5f6-7890-1234-abcd-ef0123456789"
                  attributes:
                    given_name: Alice
                    family_name: Smith
                    birth_date: "1995-03-15"
              profile_oid4vci:
                summary: Issue via profile (OID4VCI, post-MVP)
                value:
                  profile_id: "drivers-license/1.0"
                  attributes:
                    given_name: Alice
                    family_name: Smith
                    birth_date: "1995-03-15"
              legacy:
                summary: Legacy mode (direct cred_def)
                value:
                  credential_definition_id: "a1b2c3d4-5678-9012-abcd-ef0123456789"
                  format: anoncreds
                  connection_id: "c3d4e5f6-7890-1234-abcd-ef0123456789"
                  attributes:
                    given_name: Alice
                    birth_date: "1995-03-15"
      responses:
        "200":
          description: Credential offer URI generated (OID4VCI, connectionless)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Operation"
              example:
                id: "op-uuid"
                type: credential.offer
                state: completed
                created_at: "2025-01-15T10:30:00.000Z"
                updated_at: "2025-01-15T10:30:00.000Z"
                result:
                  credential_offer_uri: "openid-credential-offer://..."
        "202":
          description: Credential offer sent (DIDComm, async)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Operation"
              example:
                id: "op-uuid"
                type: credential.offer
                state: pending
                created_at: "2025-01-15T10:30:00.000Z"
                updated_at: "2025-01-15T10:30:00.000Z"
                result: null
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/tenants/{tenantId}/credentials/offer-batch:
    parameters:
      - $ref: "#/components/parameters/TenantId"
    post:
      operationId: offerCredentialBatch
      summary: Batch credential issuance
      description: |
        Issue credentials to multiple holders in a single request. Max 500 items.
        All items use the same profile. DIDComm delivery only (connection_id required per item).
      tags: [Credentials]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OfferCredentialBatchRequest"
      responses:
        "202":
          description: Batch accepted for processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Operation"
              example:
                id: "batch-op-uuid"
                type: credential.offer-batch
                state: processing
                created_at: "2025-01-15T10:30:00.000Z"
                updated_at: "2025-01-15T10:30:00.000Z"
                result: null
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/tenants/{tenantId}/credentials/{exchangeId}/accept:
    parameters:
      - $ref: "#/components/parameters/TenantId"
      - name: exchangeId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: >
          The `id` (Operation UUID) returned by `POST /credentials/offer`.
          This is **not** the persisted Credential record UUID—that is used by
          `GET /credentials/{credentialId}` and `POST /credentials/{credentialId}/revoke`.
    post:
      operationId: acceptCredential
      summary: Accept a credential offer (holder)
      tags: [Credentials]
      responses:
        "200":
          description: Credential accepted (synchronous confirmation)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Operation"
        "202":
          description: Accept request submitted (async)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Operation"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/tenants/{tenantId}/credentials/{exchangeId}/reject:
    parameters:
      - $ref: "#/components/parameters/TenantId"
      - name: exchangeId
