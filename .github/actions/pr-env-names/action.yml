name: PR Environment Names
description: Single source of truth for per-PR resource names (Helm release, route host, database)

inputs:
  pr_number:
    description: "Pull request number"
    required: true

outputs:
  release_name:
    description: "Helm release name for the PR environment (pr-<N>-vc-common-service)"
    value: ${{ steps.names.outputs.release_name }}
  route_host:
    description: "Route hostname for the PR environment"
    value: ${{ steps.names.outputs.route_host }}
  db_name:
    description: "PostgreSQL database name for the PR environment (vc_pr_<N>)"
    value: ${{ steps.names.outputs.db_name }}

runs:
  using: composite
  steps:
    # Input is passed via env (not inline ${{ }} interpolation) so untrusted
    # values can never rewrite the script before validation runs.
    - name: Derive names
      id: names
      shell: bash
      env:
        PR_NUMBER: ${{ inputs.pr_number }}
      run: |
        if ! [[ "${PR_NUMBER}" =~ ^[0-9]+$ ]]; then
          echo "::error::pr_number must be a positive integer, got: '${PR_NUMBER}'"
          exit 1
        fi
        APP_NAME="vc-common-service"
        {
          echo "release_name=pr-${PR_NUMBER}-${APP_NAME}"
          echo "route_host=pr-${PR_NUMBER}-${APP_NAME}-dev.apps.silver.devops.gov.bc.ca"
          echo "db_name=vc_pr_${PR_NUMBER}"
        } >> "${GITHUB_OUTPUT}"
