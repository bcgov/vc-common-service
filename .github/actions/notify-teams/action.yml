name: 'Notify Teams'
description: 'Post an Adaptive Card to a Microsoft Teams Workflows webhook'

inputs:
  webhook_url:
    description: 'Microsoft Teams Workflows webhook URL'
    required: false
    default: ''
  status:
    description: 'Pipeline status (success or failure)'
    required: true
  image_ref:
    description: 'Published container image reference'
    required: false
    default: ''
  chart_version:
    description: 'Published Helm chart version'
    required: false
    default: ''
  repo:
    description: 'Repository name (owner/repo)'
    required: true
  ref:
    description: 'Git ref (branch or tag)'
    required: true
  sha:
    description: 'Full git commit SHA'
    required: true
  actor:
    description: 'GitHub actor who triggered the workflow'
    required: true
  run_url:
    description: 'URL to the workflow run'
    required: true

runs:
  using: composite
  steps:
    - name: Send Teams notification
      shell: bash
      env:
        WEBHOOK_URL: ${{ inputs.webhook_url }}
        STATUS: ${{ inputs.status }}
        IMAGE_REF: ${{ inputs.image_ref }}
        CHART_VERSION: ${{ inputs.chart_version }}
        REPO: ${{ inputs.repo }}
        REF: ${{ inputs.ref }}
        SHA: ${{ inputs.sha }}
        ACTOR: ${{ inputs.actor }}
        RUN_URL: ${{ inputs.run_url }}
      run: |
        # Check if webhook URL is configured
        if [ -z "${WEBHOOK_URL}" ]; then
          echo "⚠️ TEAMS_WEBHOOK_URL is not configured, skipping notification"
          exit 0
        fi

        # Determine accent color and status icon
        if [ "${STATUS}" = "success" ]; then
          COLOR="Good"
          ICON="✅"
        else
          COLOR="Attention"
          ICON="❌"
        fi

        # Compute short SHA (7 characters)
        SHORT_SHA="${SHA:0:7}"

        # Determine chart version display
        if [ -n "${CHART_VERSION}" ]; then
          CHART_DISPLAY="${CHART_VERSION}"
        else
          CHART_DISPLAY="N/A"
        fi

        # Build the Adaptive Card JSON payload
        PAYLOAD=$(cat <<EOF
        {
          "type": "message",
          "attachments": [{
            "contentType": "application/vnd.microsoft.card.adaptive",
            "content": {
              "\$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
              "type": "AdaptiveCard",
              "version": "1.4",
              "body": [
                {
                  "type": "TextBlock",
                  "text": "${ICON} CD Pipeline: ${STATUS}",
                  "weight": "bolder",
                  "color": "${COLOR}"
                },
                {
                  "type": "FactSet",
                  "facts": [
                    { "title": "Repository", "value": "${REPO}" },
                    { "title": "Ref", "value": "${REF}" },
                    { "title": "Commit", "value": "${SHORT_SHA}" },
                    { "title": "Image", "value": "${IMAGE_REF}" },
                    { "title": "Chart", "value": "${CHART_DISPLAY}" },
                    { "title": "Actor", "value": "${ACTOR}" }
                  ]
                },
                {
                  "type": "ActionSet",
                  "actions": [
                    {
                      "type": "Action.OpenUrl",
                      "title": "View Run",
                      "url": "${RUN_URL}"
                    }
                  ]
                }
              ]
            }
          }]
        }
        EOF
        )

        # POST the payload to the Teams webhook
        echo "Sending notification to Teams..."
        RESPONSE_FILE=$(mktemp)
        HTTP_CODE=$(curl --silent --output "${RESPONSE_FILE}" --write-out "%{http_code}" \
          --fail-with-body \
          --max-time 30 \
          -H "Content-Type: application/json" \
          -d "${PAYLOAD}" \
          "${WEBHOOK_URL}") || true

        RESPONSE_BODY=$(cat "${RESPONSE_FILE}" 2>/dev/null || echo "")
        rm -f "${RESPONSE_FILE}"

        # Check if the request succeeded (2xx status code)
        if [[ ! "${HTTP_CODE}" =~ ^2[0-9]{2}$ ]]; then
          echo "::error::Teams notification failed (HTTP ${HTTP_CODE}). Response: ${RESPONSE_BODY}"
          echo "⚠️ Teams notification failed but will not fail the pipeline"
          exit 0
        fi

        echo "✅ Teams notification sent successfully"
