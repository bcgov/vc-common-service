name: CD

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read
  packages: write

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci-checks:
    uses: ./.github/workflows/ci-checks.yml
    secrets: inherit

  preflight:
    runs-on: ubuntu-latest
    outputs:
      chart-exists: ${{ steps.check-chart.outputs.chart-exists }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Check chart existence
        id: check-chart
        run: |
          if test -f charts/vc-common-service/Chart.yaml; then
            echo "chart-exists=true" >> "${GITHUB_OUTPUT}"
          else
            echo "chart-exists=false" >> "${GITHUB_OUTPUT}"
          fi

  publish-image:
    needs: [ci-checks]
    if: github.repository_owner == 'bcgov'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Build and push image
        uses: ./.github/actions/build-image
        with:
          image_name: ${{ github.repository }}
          registry_username: ${{ github.actor }}
          registry_password: ${{ secrets.GITHUB_TOKEN }}

  publish-chart:
    needs: [publish-image, preflight]
    if: startsWith(github.ref, 'refs/tags/v') && needs.preflight.outputs.chart-exists == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Publish Helm chart
        uses: ./.github/actions/publish-chart
        with:
          registry_username: ${{ github.actor }}
          registry_password: ${{ secrets.GITHUB_TOKEN }}

  notify-teams:
    needs: [publish-image, publish-chart]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Compute aggregate status
        id: status
        run: |
          # Treat skipped/cancelled as success; any failure means failure
          RESULTS="${{ needs.publish-image.result }} ${{ needs.publish-chart.result }}"
          if echo "${RESULTS}" | grep -q "failure"; then
            echo "aggregate=failure" >> "${GITHUB_OUTPUT}"
          else
            echo "aggregate=success" >> "${GITHUB_OUTPUT}"
          fi

      - name: Notify Teams
        uses: ./.github/actions/notify-teams
        with:
          webhook_url: ${{ secrets.TEAMS_WEBHOOK_URL }}
          status: ${{ steps.status.outputs.aggregate }}
          repo: ${{ github.repository }}
          ref: ${{ github.ref_name }}
          sha: ${{ github.sha }}
          actor: ${{ github.actor }}
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
